# Model configuration for the OpenRouter provider.
#
# The API key is NOT here -- it stays in .env as OPEN_ROUTER_KEY (it is a secret).
# This file only chooses WHICH models fill the four participant slots.
#
# Roles (3 solvers + 1 judge) are still assigned dynamically at runtime by the
# Stage 0 / 0.5 confidence algorithm. This file just defines the pool of four.

# Run settings (previously the PROBLEM_LIMIT / OUTPUT_FILE env vars).
[run]
# Which problems to run:
#  - If problem_ids is non-empty, exactly those run (in order) and problem_limit
#    is ignored.
#  - Otherwise problem_limit problems are chosen at RANDOM. Set seed for a
#    reproducible sample; remove/comment seed for a fresh sample each run.
dataset = "llm_hard_problems.json"  # which file under data/ to load
problem_ids = []             # e.g. ["math_001", "game_001"]
problem_limit = 0            # how many random problems to run; 0 (or remove) = all
seed = 0
max_concurrent_problems = 10  # 0 = all at once; 29-at-once overwhelms providers (truncated responses), so cap the in-flight problems
output_file = "hard_result.json"

[defaults]
temperature = 0.7
max_tokens = 40000          # cap per response; raise if solutions get truncated

# Strong model used to grade free-answer problems (semantic equivalence check).
# Number / multiple-choice problems are graded deterministically with no API call.
[grader]
model = "google/gemini-2.5-flash"
temperature = 0.0

[participants.model_a]
model = "openai/gpt-4o-mini"

[participants.model_b]
model = "anthropic/claude-haiku-4.5"

[participants.model_c]
model = "google/gemini-2.5-flash"

[participants.model_d]
model = "x-ai/grok-4.3"
temperature = 0.3
